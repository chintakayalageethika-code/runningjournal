{% extends 'posts/base.html' %}

{% block content %}

<!-- FILTER BUTTONS -->
<div style="margin-bottom: 20px;">
    <a href="/">All</a> |
    <a href="/?category=training">Training</a> |
    <a href="/?category=race">Race</a> |
    <a href="/?category=community">Community</a> |
    <a href="/?category=volunteering">Volunteering</a>
</div>

<!-- POSTS -->
{% for post in posts %}
<div class="post-card" style="padding:0; overflow:hidden;">

    <a href="{% url 'post_detail' post.pk %}" style="text-decoration:none; color:#333;">

        {% if post.photo %}
            <img src="{{ post.photo.url }}" 
                 alt="{{ post.title }}"
                 class="{% if post.category == 'training' or post.category == 'race' %}img-top{% else %}img-center{% endif %}">
        {% else %}
            <div class="no-image">No photo</div>
        {% endif %}

        <div style="padding:14px 16px;">
            <span class="badge badge-{{ post.category }}">
                {{ post.get_category_display }}
            </span>

            <h2 style="font-size:16px; margin-top:6px;">
                {{ post.title }}
            </h2>
        </div>

    </a>

</div>
{% endfor %}

{% endblock %}
