<!DOCTYPE html>
<html>
<head>
    <title>Geethika Runs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: sans-serif; 
            background: #f5f5f5; 
            color: #333; 
        }

        .navbar { 
            background: white; 
            padding: 16px 24px; 
            border-bottom: 1px solid #eee; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .navbar h1 { font-size: 20px; font-weight: 600; }
        .navbar p { font-size: 13px; color: #888; }

        .nav-links a {
            font-size: 14px;
            text-decoration: none;
            color: #333;
            margin-left: 20px;
        }

        .nav-links a:hover { color: #1D9E75; }

        .container { 
            max-width: 700px;
            margin: 40px auto;
            padding: 0 16px; 
        }

        .post-card { 
            background: white; 
            border: 1px solid #eee; 
            border-radius: 12px; 
            margin-bottom: 20px;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .post-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
        }

        .badge { 
            display: inline-block; 
            font-size: 11px; 
            padding: 3px 10px; 
            border-radius: 20px; 
            font-weight: 500; 
        }

        .badge-training { background: #E1F5EE; color: #085041; }
        .badge-race { background: #FAECE7; color: #712B13; }
        .badge-community { background: #EEEDFE; color: #3C3489; }
        .badge-volunteering { background: #FEF3C7; color: #92400E; }

        .img-top {
            width: 100%;
            height: 220px;
            object-fit: cover;
            object-position: 50% 15%;
            border-radius: 12px 12px 0 0;
        }

        .img-center {
            width: 100%;
            height: 220px;
            object-fit: cover;
            object-position: 50% 50%;
            border-radius: 12px 12px 0 0;
        }

        .no-image {
            width: 100%;
            height: 220px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-size: 13px;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div>
            <h1>Geethika Runs</h1>
            <p>My running journey</p>
        </div>
        <div class="nav-links">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'strava_runs' %}">Strava</a>
            <a href="{% url 'progress' %}">Progress</a>
        </div>
    </div>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
