{% extends 'posts/base.html' %}

{% block content %}

<h2 style="margin-bottom:24px;">My progress</h2>

<div style="display:grid; grid-template-columns: repeat(2, 1fr); gap:12px; margin-bottom:32px;">

    <div style="background:white; border-radius:12px; padding:20px; text-align:center;">
        <p style="font-size:28px; font-weight:600; color:#1D9E75;">{{ total_distance }}km</p>
        <p style="font-size:13px; color:#888; margin-top:4px;">Total distance</p>
    </div>

    <div style="background:white; border-radius:12px; padding:20px; text-align:center;">
        <p style="font-size:28px; font-weight:600; color:#1D9E75;">{{ total_runs }}</p>
        <p style="font-size:13px; color:#888; margin-top:4px;">Total runs</p>
    </div>

    <div style="background:white; border-radius:12px; padding:20px; text-align:center;">
        <p style="font-size:28px; font-weight:600; color:#1D9E75;">{{ avg_distance }}km</p>
        <p style="font-size:13px; color:#888; margin-top:4px;">Average per run</p>
    </div>

    <div style="background:white; border-radius:12px; padding:20px; text-align:center;">
        <p style="font-size:28px; font-weight:600; color:#1D9E75;">{{ races }}</p>
        <p style="font-size:13px; color:#888; margin-top:4px;">Races completed</p>
    </div>

</div>

<a href="{% url 'home' %}" style="font-size:13px; color:#888; text-decoration:none;">← Back to home</a>

{% endblock %}
